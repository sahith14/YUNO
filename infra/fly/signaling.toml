# yuno-signaling — WebSocket signaling server
# CRITICAL: this is a stateful socket service. We use sticky sessions, no
# auto-stop, and longer health-check grace.
app = "yuno-signaling"
primary_region = "iad"

[build]
  dockerfile = "apps/signaling/Dockerfile"

[env]
  NODE_ENV = "production"
  SIGNALING_PORT = "4001"
  SIGNALING_HOST = "0.0.0.0"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 4001
  force_https = true
  # Always-warm — disconnecting active sockets is bad UX
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 3
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"   # sticky on connections, not requests
    soft_limit = 1000
    hard_limit = 1500

  [[http_service.checks]]
    interval = "20s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "performance-2x"
  memory_mb = 2048

[[regions]]
  code = "iad"
[[regions]]
  code = "lhr"
[[regions]]
  code = "sin"

# Deployment strategy — bluegreen so active calls aren't dropped on rollouts
[deploy]
  strategy = "bluegreen"
