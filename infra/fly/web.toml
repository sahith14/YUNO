# yuno-web — Next.js frontend
app = "yuno-web"
primary_region = "iad"

[build]
  dockerfile = "apps/web/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/"

[[vm]]
  size = "performance-1x"
  memory_mb = 1024

[[regions]]
  code = "iad"
[[regions]]
  code = "lhr"
[[regions]]
  code = "sin"
