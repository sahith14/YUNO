# yuno-api — REST API on Fly.io
app = "yuno-api"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  API_PORT = "4000"
  API_HOST = "0.0.0.0"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "performance-1x"
  memory_mb = 1024

# Region replicas — Fly will auto-create machines per region as load demands
[[regions]]
  code = "iad"   # Ashburn (NA-east)
[[regions]]
  code = "lhr"   # London
[[regions]]
  code = "sin"   # Singapore
