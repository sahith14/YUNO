# =============================================================================
# YUNO — Coturn TURN/STUN configuration
# =============================================================================
# Listening ports
listening-port=3478
tls-listening-port=5349

# Realm — must match TURN_REALM env on the API server
realm=yuno.local

# Time-based credentials with shared secret (matches TURN_SHARED_SECRET on API)
# We compute: username = "<unix-expiry>:<userId>"
#             credential = base64(HMAC-SHA1(secret, username))
use-auth-secret
static-auth-secret=change-me-turn-shared-secret

# Bind to all interfaces for development; in production set to specific IPs
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Performance
total-quota=1200
user-quota=24
stale-nonce=600

# Refuse "open relay" abuse — only allow our auth scheme
no-cli
no-multicast-peers
no-tlsv1
no-tlsv1_1
no-stdout-log

# Bind only to predictable port range for relay (helps with iptables)
min-port=49160
max-port=49200

# Logs
verbose
log-file=stdout
syslog
fingerprint

# TLS — provide certs via volume mount in production
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/key.pem
# cipher-list="ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20:!aNULL:!MD5"

# Disallow STUN/TURN from internal networks (prevent SSRF abuse)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.1-127.255.255.255
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.254
